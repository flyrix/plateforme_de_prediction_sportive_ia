services:
  - type: web
    name: ia-betpredict-api
    runtime: python
    rootDir: ia_betpredict/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
    autoDeploy: true
